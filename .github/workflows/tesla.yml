name: tesla
on:
  workflow_dispatch:
    inputs:
      action:
        description: register, exchange, or refresh
        required: true
      code:
        description: auth code (exchange) or refresh token (refresh)
        required: false
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: run
        env:
          CLIENT_ID: ${{ secrets.TESLA_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.TESLA_CLIENT_SECRET }}
          ACTION: ${{ github.event.inputs.action }}
          CODE: ${{ github.event.inputs.code }}
        run: |
          set -e
          AUD=https://fleet-api.prd.eu.vn.cloud.tesla.com
          TOK=https://fleet-auth.prd.vn.cloud.tesla.com/oauth2/v3/token
          if [ "$ACTION" = register ]; then
            PT=$(curl -s -X POST --data-urlencode grant_type=client_credentials --data-urlencode client_id="$CLIENT_ID" --data-urlencode client_secret="$CLIENT_SECRET" --data-urlencode scope=openid --data-urlencode audience=$AUD $TOK | python3 -c 'import sys,json;print(json.load(sys.stdin).get("access_token",""))')
            test -n "$PT"
            curl -s -X POST -H "Authorization: Bearer $PT" -H 'Content-Type: application/json' -d '{"domain":"wzfmdrf7m8-dev.github.io"}' $AUD/api/1/partner_accounts
            echo
            curl -s -H "Authorization: Bearer $PT" "$AUD/api/1/partner_accounts/public_key?domain=wzfmdrf7m8-dev.github.io"
          else
            if [ "$ACTION" = exchange ]; then
              RESP=$(curl -s -X POST --data-urlencode grant_type=authorization_code --data-urlencode client_id="$CLIENT_ID" --data-urlencode client_secret="$CLIENT_SECRET" --data-urlencode code="$CODE" --data-urlencode audience=$AUD --data-urlencode redirect_uri=https://wzfmdrf7m8-dev.github.io/callback $TOK)
            else
              RESP=$(curl -s -X POST --data-urlencode grant_type=refresh_token --data-urlencode client_id="$CLIENT_ID" --data-urlencode refresh_token="$CODE" $TOK)
            fi
            echo "" | base64 -d > pub.pem
            printf '%s' "$RESP" > t.json
            openssl rand -hex 32 > k.txt
            openssl enc -aes-256-cbc -pbkdf2 -pass file:k.txt -in t.json -out t.enc
            openssl pkeyutl -encrypt -pubin -inkey pub.pem -in k.txt -out k.enc
            echo KEY_ENC=$(base64 -w0 k.enc)
            echo DATA_ENC=$(base64 -w0 t.enc)
          fi
